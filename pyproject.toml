[project]
name = "climate_guard"
version = "0.1.0"
description = "A web scraper for Latvian news articles"
authors = [
    {name = "Your Name", email = "your.email@example.com"},
]
dependencies = [
    "requests>=2.26.0",
    "beautifulsoup4>=4.10.0",
    "gradio>=4.44.1",
    "openai>=1.51.0",
    "python-dotenv>=1.0.1",
    "anthropic>=0.34.2",
    "transformers>=4.45.1",
    "mlx-lm>=0.19.0",
    "vllm>=0.6.2",
    "llama-index>=0.11.16",
    "llama-index-llms-ollama>=0.3.3",
    "ipykernel>=6.29.5",
    "newspaper3k>=0.2.8",
    "lxml[html-clean]>=5.3.0",
    "gdeltdoc>=1.5.0",
    "newspaper3k>=0.2.8",
    "lxml-html-clean>=0.2.2",
    "jupyter>=1.1.1",
    "pydantic>=2.9.2",
    "wordcloud>=1.9.3",
]
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["climate_guard"]


[tool.black]
line-length = 100
target-version = ['py312']
